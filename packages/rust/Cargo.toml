[package]
name = soroban-utilities
version = 0.1.0
edition = 2021
description = Reusable helper utilities for Soroban smart contract development
license = MIT

[lib]
crate-type = [cdylib, rlib]

[dependencies]
soroban-sdk = { version = 20.0.0, features = [alloc] }

[dev-dependencies]
soroban-sdk = { version = 20.0.0, features = [testutils] }
